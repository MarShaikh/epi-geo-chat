services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Shared temp dir for sandbox I/O — must match the host-mounted volume below
      - SANDBOX_TEMP_DIR=/tmp/epi-sandbox
    volumes:
      # Mount Docker socket so the backend can spawn sandbox containers locally
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount Azure CLI config so DefaultAzureCredential can use your local login
      # Not read-only because Azure CLI needs to write session files (az.sess)
      - ~/.azure:/root/.azure
      # Shared temp directory for sandbox input/output — the Docker daemon resolves
      # bind mounts relative to the host, so the backend and sandbox containers must
      # both use a host-visible path. See docs/infra/local-development.md for details.
      - /tmp/epi-sandbox:/tmp/epi-sandbox
    depends_on:
      sandbox:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: frontend/
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      # Inside Docker, 'backend' resolves to the backend container via Compose DNS
      - VITE_API_TARGET=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  sandbox:
    build:
      context: src/code_executor/docker/
      dockerfile: Dockerfile
    image: epi-geo-sandbox:latest
    pull_policy: never
    # Build-only service: builds and tags the sandbox image, then exits.
    # The backend spawns sandbox containers on demand via the Docker socket.
    entrypoint: ["echo", "sandbox image built successfully"]
